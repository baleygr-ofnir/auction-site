---
services:
  db:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./auction-site-api
      dockerfile: Dockerfile
      args:
        DOTNET_VERSION: ${DOTNET_VERSION}
        API_PORT: ${API_PORT}
    restart: always
    ports:
      - "${API_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      # The Host is 'db', matching the service name above
      - ConnectionStrings__DefaultConnection=Host=db;Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      - db

  app:
    build:
      context: ./auction-site-app
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
        NGINX_VERSION: ${NGINX_VERSION}
        APP_PORT: ${APP_PORT}
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT}:80" # Maps local 3000 to Nginx 80
    depends_on:
      - api
