name: Auction Komodo Stack CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    name: Build & Test .NET 10 API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name:
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name:
        working-directory: ./auction-site-api
        run: dotnet restore

      - name: Build API
        working-directory: ./auction-site-api
        run: dotnet build --configuration Release --no-restore

  test-app:
    name: Build & Test React/Vite App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: './auction-site-app/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./auction-site-app
        run: pnpm install

      - name: Build App (Compile Check)
        working-directory: ./auction-site-app
        run: pnpm run build
        env:
          VITE_API_BASE_URL: "http://dummy-ci-url/api"

  deploy:
    name: Trigger Komodo Deploy Webhook
    needs: [test-api, test-app]
    if: github.ref == 'refs/heads/main/' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Run Komodo Deployment
        run: |
          HTTP_RESPONSE=$(curl --silent --write-out "HTTPSTATUS:%{http_code}" -X POST "${{ secrets.KOMODO_WEBHOOK_URL }}")
          HTTP_STATUS=$(echo $HTTP_RESPONSE | tr -d '\n' | sed -E 's/.*HTTPSTATUS:([0-9]+)$/\1/')
  
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 202 ] && [ "$HTTP_STATUS -ne 204 ]; then
            echo "Deployment failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Deployment triggered successfully"
